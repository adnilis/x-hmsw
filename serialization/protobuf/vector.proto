syntax = "proto3";

package protobuf;

option go_package = "github.com/adnilis/x-hmsw/serialization/protobuf";

message VectorPB {
  string id = 1;
  repeated float vector = 2;
  map<string, string> payload = 3;
  int64 timestamp = 4;
}

message VectorBatch {
  repeated VectorPB vectors = 1;
}

message SearchResultPB {
  string id = 1;
  float distance = 2;
  map<string, string> payload = 3;
}
